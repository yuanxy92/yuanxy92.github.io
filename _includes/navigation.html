<div class="navigation-wrapper">
	<div class="site-name">
		<a href="{{ '/' | relative_url }}">{{ site.title }}</a>
	</div><!-- /.site-name -->
  {% capture url %}{{ page.url | remove:'index.html' }}{% endcapture %}
  <button class="nav-toggle" type="button" aria-expanded="false" aria-controls="site-top-nav">
    <span class="nav-toggle-icon" aria-hidden="true"></span>
    <span class="sr-only">Open menu</span>
  </button>
	<div class="top-navigation">
		<nav id="site-top-nav" role="navigation" itemscope itemtype="http://schema.org/SiteNavigationElement">
		    <ul>
		        {% for link in site.links %}
            <li><a href="{{ link.url | relative_url }}" {% if url == link.url %}class="top-navigation-current"{% endif %}>{{ link.title }}</a></li>
		        {% endfor %}
		    </ul>
		</nav>
	</div><!-- /.top-navigation -->
</div><!-- /.navigation-wrapper -->

<script>
  (function () {
    var btn = document.querySelector('.nav-toggle');
    var nav = document.getElementById('site-top-nav');
    if (!btn || !nav) return;

    btn.addEventListener('click', function () {
      var expanded = btn.getAttribute('aria-expanded') === 'true';
      btn.setAttribute('aria-expanded', String(!expanded));
      nav.classList.toggle('is-open', !expanded);
    });

    nav.querySelectorAll('a').forEach(function (link) {
      link.addEventListener('click', function () {
        btn.setAttribute('aria-expanded', 'false');
        nav.classList.remove('is-open');
      });
    });
  })();
</script>
